backend:
  name: git-gateway
  branch: master

media_folder: public/images
public_folder: /images

collections:
  - name: products_json
    label: Products Data
    files:
      - name: products
        label: All Products
        file: src/data/products.json
        fields:
          - name: whatsappNumber
            label: WhatsApp Number
            widget: string
          - name: categories
            label: Categories
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
              - name: label
                label: Label
                widget: string
              - name: icon
                label: Icon
                widget: string
              - name: subcategories
                label: Subcategories
                widget: list
                fields:
                  - name: id
                    label: ID
                    widget: string
                  - name: label
                    label: Label
                    widget: string
                  - name: products
                    label: Products
                    widget: list
                    fields:
                      - name: id
                        label: ID
                        widget: string
                      - name: name
                        label: Name
                        widget: string
                      - name: description
                        label: Description
                        widget: text
                      - name: specs
                        label: Specs
                        widget: list
                        field:
                          name: spec
                          label: Spec
                          widget: string
                      - name: tag
                        label: Tag
                        widget: string
                        required: false
                      - name: images
                        label: Images
                        widget: list
                        field:
                          name: image
                          label: Image Path
                          widget: string