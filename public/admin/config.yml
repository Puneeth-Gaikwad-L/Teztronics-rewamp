backend:
  name: git-gateway
  branch: master

media_folder: public/images
public_folder: /images

collections:
  - name: products_json
    label: Products Data
    files:
      - name: products
        label: All Products
        file: src/data/products.json
        fields:
          - name: whatsappNumber
            label: "WhatsApp Number (10 digits, no country code, e.g. 7483581847)"
            widget: string
          - name: contact
            label: Contact Information
            widget: object
            fields:
              - name: city
                label: City
                widget: string
              - name: address
                label: Address
                widget: string  
          - name: categories
            label: Categories
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
              - name: label
                label: Label
                widget: string
              - name: icon
                label: Icon
                widget: string
              - name: subcategories
                label: Subcategories
                widget: list
                required: false
                min: 0
                fields:
                  - name: id
                    label: ID
                    widget: string
                    required: false
                  - name: label
                    label: Label
                    widget: string
                    required: false
                  - name: products
                    label: Products
                    widget: list
                    fields:
                      - name: id
                        label: ID
                        widget: string
                      - name: name
                        label: Name
                        widget: string
                      - name: description
                        label: Description
                        widget: text
                      - name: specs
                        label: Specs
                        widget: list
                        required: false
                        min: 0
                        field:
                          name: spec
                          label: Spec
                          widget: string
                      - name: tag
                        label: Tag
                        widget: string
                        required: false
                      - name: featured
                        label: "Top Seller (shows in Top Selling Products section)"
                        widget: boolean
                        default: false
                        required: false
                      - name: images
                        label: Images
                        widget: list
                        field:
                          name: image
                          label: Image Path
                          widget: image
              - name: products
                label: Products (flat — used when no subcategories)
                widget: list
                required: false
                min: 0
                fields:
                  - name: id
                    label: ID
                    widget: string
                  - name: name
                    label: Name
                    widget: string
                  - name: description
                    label: Description
                    widget: text
                  - name: specs
                    label: Specs
                    widget: list
                    required: false
                    min: 0
                    field:
                      name: spec
                      label: Spec
                      widget: string
                  - name: tag
                    label: Tag
                    widget: string
                    required: false
                  - name: featured
                    label: "Top Seller (shows in Top Selling Products section)"
                    widget: boolean
                    default: false
                    required: false
                  - name: images
                    label: Images
                    widget: list
                    field:
                      name: image
                      label: Image Path
                      widget: image